<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Counter API Interface</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.6;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            resize: vertical;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            align-self: flex-start;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <a href="/" class="back-link">&larr; Back to Dashboard</a>

    <h1>Text Counting Tool</h1>
    <p>Enter text below to see the counts from the Flask API.</p>

    <div class="container">
        <label for="inputText"><strong>Input Text:</strong></label>
        <textarea id="inputText" placeholder="Paste your text here..."></textarea>

        <button id="countBtn">Count Text</button>

        <label for="outputText"><strong>JSON Result:</strong></label>
        <textarea id="outputText" readonly placeholder="Results will appear here..."></textarea>

        <div id="errorMessage" class="error"></div>
    </div>

    <script>
        const countBtn = document.getElementById('countBtn');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const errorMessage = document.getElementById('errorMessage');

        countBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();

            // Basic UI reset
            errorMessage.textContent = '';
            outputText.value = '';

            if (!text) {
                errorMessage.textContent = 'Please enter some text first.';
                return;
            }

            countBtn.disabled = true;
            countBtn.textContent = 'Counting...';

            try {
                const response = await fetch('/api/v1/counts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text }),
                });

                const result = await response.json();

                if (response.ok) {
                    // Display pretty-printed JSON (4 spaces indentation)
                    outputText.value = JSON.stringify(result, null, 4);
                } else {
                    errorMessage.textContent = `Error: ${result.error || 'Unknown error occurred'}`;
                }
            } catch (error) {
                errorMessage.textContent = 'Failed to connect to the server. Is the Flask app running?';
                console.error('Fetch error:', error);
            } finally {
                countBtn.disabled = false;
                countBtn.textContent = 'Count Text';
            }
        });
    </script>
</body>

</html>
