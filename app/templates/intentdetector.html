<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent Detector</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.6;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            resize: vertical;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            align-self: flex-start;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }
        
        .result-box {
            margin-top: 1rem;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .stat-label {
            font-weight: 600;
            color: #64748b;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #0f172a;
        }

        .stat-badge {
            background-color: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="/" class="back-link">&larr; Back to Dashboard</a>

    <h1>🎯 Intent Detector</h1>
    <p>Type a command (even with minor typos) to see if we can detect your intended action based on our keyword fuzzy matcher.</p>

    <div class="container">
        <label for="inputText"><strong>Enter your command:</strong></label>
        <textarea id="inputText" placeholder="e.g. 'I need some halp' or 'open my setings'"></textarea>

        <button id="detectBtn">Detect Intent</button>

        <div id="errorMessage" class="error"></div>
        
        <div id="outputArea" style="display: none;">
            <h3>Detection Results:</h3>
            <div class="result-box">
                <div class="stat">
                    <span class="stat-label">Domain</span>
                    <span id="resDomain" class="stat-value stat-badge"></span>
                </div>
                <div class="stat">
                    <span class="stat-label">Intent</span>
                    <span id="resIntent" class="stat-value" style="color: #007bff;"></span>
                </div>
                <div class="stat" style="border-bottom: none; padding-bottom: 0;">
                    <span class="stat-label">Confidence</span>
                    <span id="resConfidence" class="stat-value"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const detectBtn = document.getElementById('detectBtn');
        const inputText = document.getElementById('inputText');
        const outputArea = document.getElementById('outputArea');
        const errorMessage = document.getElementById('errorMessage');

        detectBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();

            errorMessage.textContent = '';
            outputArea.style.display = 'none';

            if (!text) {
                errorMessage.textContent = 'Please enter a command first.';
                return;
            }

            detectBtn.disabled = true;
            detectBtn.textContent = 'Detecting...';

            try {
                const response = await fetch('/api/v1/detect_intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text }),
                });

                const result = await response.json();

                if (response.ok) {
                    const data = result.data.intent_data;
                    
                    document.getElementById('resDomain').textContent = data.domain;
                    document.getElementById('resIntent').textContent = data.intent;
                    document.getElementById('resConfidence').textContent = `${data.confidence}%`;
                    
                    outputArea.style.display = 'block';
                } else {
                    errorMessage.textContent = `Error: ${result.error || 'Unknown error occurred'}`;
                }
            } catch (error) {
                errorMessage.textContent = 'Failed to connect to the server. Is the Flask app running?';
                console.error('Fetch error:', error);
            } finally {
                detectBtn.disabled = false;
                detectBtn.textContent = 'Detect Intent';
            }
        });
    </script>
</body>
</html>
