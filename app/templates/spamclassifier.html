<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Classifier</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.6;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            resize: vertical;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }

        .result-box {
            margin-top: 1rem;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .prediction-badge {
            display: inline-block;
            font-size: 2rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .spam {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .ham {
            background-color: #dcfce7;
            color: #14532d;
        }

        .confidence-bar {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 8px;
            height: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        .algo-tag {
            display: inline-block;
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #475569;
            margin-top: 8px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="/" class="back-link">&larr; Back to Dashboard</a>

    <h1>🛡️ Spam Classifier</h1>
    <p>Paste a message below and choose an algorithm. Our trained ML model will predict whether the message is <strong>Spam</strong> or <strong>Ham</strong> (legitimate).</p>

    <div class="container">
        <label for="inputText"><strong>Enter message to classify:</strong></label>
        <textarea id="inputText" placeholder="e.g. 'URGENT! You have won a $1000 gift card. Click here to claim now!'"></textarea>

        <div class="controls">
            <label for="algoSelect"><strong>Algorithm:</strong></label>
            <select id="algoSelect">
                <option value="lr">Logistic Regression</option>
                <option value="nb">Naive Bayes</option>
            </select>
            <button id="classifyBtn">Classify</button>
        </div>

        <div id="errorMessage" class="error"></div>

        <div id="outputArea" style="display: none;">
            <h3>Classification Result:</h3>
            <div class="result-box">
                <div id="resBadge" class="prediction-badge"></div>
                <p>Confidence: <strong id="resConfidence">0%</strong></p>
                <div class="confidence-bar">
                    <div id="resBar" class="confidence-fill"></div>
                </div>
                <div id="resAlgo" class="algo-tag"></div>
            </div>
        </div>
    </div>

    <script>
        const classifyBtn = document.getElementById('classifyBtn');
        const inputText = document.getElementById('inputText');
        const algoSelect = document.getElementById('algoSelect');
        const outputArea = document.getElementById('outputArea');
        const errorMessage = document.getElementById('errorMessage');
        const resBadge = document.getElementById('resBadge');
        const resConfidence = document.getElementById('resConfidence');
        const resBar = document.getElementById('resBar');
        const resAlgo = document.getElementById('resAlgo');

        classifyBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();
            const algorithm = algoSelect.value;

            errorMessage.textContent = '';
            outputArea.style.display = 'none';

            if (!text) {
                errorMessage.textContent = 'Please enter a message first.';
                return;
            }

            classifyBtn.disabled = true;
            classifyBtn.textContent = 'Classifying...';

            try {
                const response = await fetch('/api/v1/spamclassifier', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, algorithm: algorithm }),
                });

                const result = await response.json();

                if (response.ok) {
                    const data = result.data;

                    if (data.prediction === "Model Missing") {
                        errorMessage.textContent = "Error: The ML model file is missing. Run python spamclassifier/scripts/trainmodel.py first.";
                        return;
                    }

                    resBadge.textContent = data.prediction;
                    if (data.prediction === "Spam") {
                        resBadge.className = 'prediction-badge spam';
                        resBar.style.backgroundColor = '#ef4444';
                    } else {
                        resBadge.className = 'prediction-badge ham';
                        resBar.style.backgroundColor = '#22c55e';
                    }

                    resConfidence.textContent = `${data.confidence}%`;
                    resBar.style.width = `${data.confidence}%`;
                    resAlgo.textContent = `Algorithm: ${data.algorithm}`;

                    outputArea.style.display = 'block';
                } else {
                    errorMessage.textContent = `Error: ${result.error || 'Unknown error occurred'}`;
                }
            } catch (error) {
                errorMessage.textContent = 'Failed to connect to the server. Is the Flask app running?';
                console.error('Fetch error:', error);
            } finally {
                classifyBtn.disabled = false;
                classifyBtn.textContent = 'Classify';
            }
        });
    </script>
</body>
</html>
