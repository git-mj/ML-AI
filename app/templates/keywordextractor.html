<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Extractor</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.6;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            resize: vertical;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            align-self: flex-start;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }
        
        .result-box {
            margin-top: 1rem;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="/" class="back-link">&larr; Back to Dashboard</a>

    <h1>🔑 Keyword Extractor</h1>
    <p>Analyze text to extract the most frequent nouns, ignoring common stopwords.</p>

    <div class="container">
        <label for="inputText"><strong>Enter text to extract keywords:</strong></label>
        <textarea id="inputText" placeholder="Type or paste a paragraph here..."></textarea>

        <button id="extractBtn">Extract Keywords</button>

        <div id="errorMessage" class="error"></div>
        
        <div id="outputArea" style="display: none;">
            <h3>Extracted Keywords (Top 10):</h3>
            <div class="result-box">
                <table>
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Keyword</th>
                            <th>Frequency</th>
                        </tr>
                    </thead>
                    <tbody id="resultContent">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const extractBtn = document.getElementById('extractBtn');
        const inputText = document.getElementById('inputText');
        const outputArea = document.getElementById('outputArea');
        const resultContent = document.getElementById('resultContent');
        const errorMessage = document.getElementById('errorMessage');

        extractBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();

            errorMessage.textContent = '';
            outputArea.style.display = 'none';

            if (!text) {
                errorMessage.textContent = 'Please enter some text first.';
                return;
            }

            extractBtn.disabled = true;
            extractBtn.textContent = 'Extracting...';

            try {
                const response = await fetch('/api/v1/extract_keywords', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text }),
                });

                const result = await response.json();

                if (response.ok) {
                    const keywords = result.data.keywords;
                    resultContent.replaceChildren();
                    
                    if (keywords.length === 0) {
                        const row = document.createElement('tr');
                        const cell = document.createElement('td');
                        cell.colSpan = 3;
                        cell.style.textAlign = 'center';
                        cell.textContent = 'No significant keywords found.';
                        row.appendChild(cell);
                        resultContent.appendChild(row);
                    } else {
                        keywords.forEach((item, index) => {
                            const row = document.createElement('tr');
                            const rankCell = document.createElement('td');
                            const keywordCell = document.createElement('td');
                            const countCell = document.createElement('td');
                            const countBadge = document.createElement('span');

                            rankCell.textContent = `#${index + 1}`;
                            keywordCell.textContent = item.keyword;
                            keywordCell.style.fontWeight = 'bold';
                            keywordCell.style.color = '#0f172a';

                            countBadge.textContent = item.count;
                            countBadge.style.background = '#e2e8f0';
                            countBadge.style.padding = '2px 8px';
                            countBadge.style.borderRadius = '12px';
                            countBadge.style.fontSize = '0.9em';
                            countCell.appendChild(countBadge);

                            row.append(rankCell, keywordCell, countCell);
                            resultContent.appendChild(row);
                        });
                    }
                    outputArea.style.display = 'block';
                } else {
                    errorMessage.textContent = `Error: ${result.error || 'Unknown error occurred'}`;
                }
            } catch (error) {
                errorMessage.textContent = 'Failed to connect to the server. Is the Flask app running?';
                console.error('Fetch error:', error);
            } finally {
                extractBtn.disabled = false;
                extractBtn.textContent = 'Extract Keywords';
            }
        });
    </script>
</body>
</html>
